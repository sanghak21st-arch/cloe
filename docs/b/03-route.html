<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>B03 경로 탐색</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0} body{font-family:'Noto Sans KR',sans-serif;background:#0b1220;color:#e5e7eb;}
.wrap{max-width:1320px;margin:0 auto;padding:20px 24px 28px;}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.brand{font-weight:700;letter-spacing:.2px} .chip{background:rgba(17,24,39,.75);padding:8px 12px;border-radius:10px;font-size:12px}
.h1{font-size:26px;font-weight:700;margin-bottom:6px} .sub{color:#9ca3af;margin-bottom:14px}
.frame{background:#111827;border:1px solid #374151;border-radius:14px;overflow:hidden;box-shadow:0 14px 40px rgba(0,0,0,.35)}
.frame img{width:100%;display:block}
.demo-nav-zone{position:fixed;top:0;bottom:0;width:20vw;z-index:9999;cursor:pointer;}
.demo-nav-zone.left{left:0} .demo-nav-zone.right{right:0}
.demo-nav-hint{position:fixed;z-index:10000;bottom:14px;background:rgba(17,24,39,.78);color:#fff;padding:8px 12px;border-radius:999px;font:12px/1.2 'Noto Sans KR',sans-serif;}
.demo-nav-hint.left{left:16px} .demo-nav-hint.right{right:16px}
@media (max-width:768px){.demo-nav-zone{width:24vw} .h1{font-size:20px}}
</style></head>
<body>
<div class="wrap">
  <div class="top"><div class="brand">WHATNEXT · Service B Demo</div><div class="chip">3/7 · B03 경로 탐색</div></div>
  <div class="h1">B03 경로 탐색</div>
  <div class="sub">트리/마인드맵으로 전체 흐름 확인</div>
  <div class="frame"><img src="assets/B03-route-explorer-v1-approved.png" alt="B03 경로 탐색"></div>
</div>
<div class="demo-nav-zone left" onclick="location.href='02-entry.html'" title="이전"></div>
<div class="demo-nav-zone right" onclick="location.href='04-marketmap.html'" title="다음"></div>
<div class="demo-nav-hint left">◀ 이전</div>
<div class="demo-nav-hint right">다음 ▶</div>
<script>window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')location.href='02-entry.html';if(e.key==='ArrowRight')location.href='04-marketmap.html';})</script>
</body></html>
